<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>{% block title %}Guess Up{% endblock %}</title>

    <!-- PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Guess Up">
    <link rel="apple-touch-icon" href="/static/icons/icon-152x152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192x192.png">

    <!-- CrazyGames SDK -->
    <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

    <!-- Fonts: Tajawal للعربي + Outfit للأرقام والإنجليزي -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
    /* ══════════════════════════════════════════════════
       DESIGN SYSTEM — GUESS UP PREMIUM
    ══════════════════════════════════════════════════ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
        /* Core Palette — Deep Space */
        --bg:        #07070f;
        --bg2:       #0d0d1a;
        --surface:   #111120;
        --card:      #161628;
        --card2:     #1c1c36;
        --glass:     rgba(22,22,40,0.7);

        /* Borders */
        --border:    rgba(99,102,241,0.12);
        --border2:   rgba(99,102,241,0.25);
        --border3:   rgba(99,102,241,0.45);

        /* Brand — Indigo to Violet */
        --p:         #6366f1;   /* primary */
        --p2:        #818cf8;   /* primary light */
        --p3:        #4f46e5;   /* primary dark */
        --v:         #a78bfa;   /* violet accent */

        /* Accents */
        --gold:      #f59e0b;
        --gold2:     #fbbf24;
        --teal:      #14b8a6;
        --rose:      #f43f5e;
        --emerald:   #10b981;

        /* Text */
        --tx:        #f1f5f9;
        --tx2:       #94a3b8;
        --tx3:       #475569;

        /* Glow Effects */
        --glow-p:    0 0 30px rgba(99,102,241,0.35);
        --glow-gold: 0 0 20px rgba(245,158,11,0.3);
        --glow-teal: 0 0 20px rgba(20,184,166,0.3);

        /* Radii */
        --r:   10px;
        --r2:  16px;
        --r3:  24px;

        /* Typography */
        --font-ar: 'Tajawal', sans-serif;
        --font-en: 'Outfit', sans-serif;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--p); }

    /* ── Base ── */
    html { scroll-behavior: smooth; }

    body {
        font-family: var(--font-ar);
        background: var(--bg);
        color: var(--tx);
        min-height: 100vh;
        line-height: 1.7;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        /* Noise texture للعمق */
        background-image:
            url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"),
            radial-gradient(ellipse 80% 60% at 10% 0%, rgba(99,102,241,0.06) 0%, transparent 60%),
            radial-gradient(ellipse 60% 50% at 90% 100%, rgba(167,139,250,0.04) 0%, transparent 60%);
    }

    /* ══ NAV ══════════════════════════════════════════ */
    nav {
        background: rgba(7,7,15,0.85);
        border-bottom: 1px solid var(--border);
        padding: 0 20px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 300;
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    .nav-logo {
        font-family: var(--font-en);
        font-size: 1.25rem;
        font-weight: 900;
        letter-spacing: -0.5px;
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--tx);
    }
    .nav-logo .logo-icon {
        width: 28px; height: 28px;
        background: linear-gradient(135deg, var(--p), var(--v));
        border-radius: 8px;
        display: flex; align-items: center; justify-content: center;
        font-size: .85rem;
        box-shadow: var(--glow-p);
    }
    .nav-logo .logo-text { color: var(--p2); }

    .nav-right {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .nav-pts {
        background: linear-gradient(135deg, rgba(99,102,241,.2), rgba(167,139,250,.1));
        border: 1px solid var(--border2);
        border-radius: 20px;
        padding: 4px 12px;
        font-family: var(--font-en);
        font-weight: 700;
        font-size: .82rem;
        color: var(--gold2);
        letter-spacing: .3px;
    }

    .nav-link {
        width: 36px; height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        display: flex; align-items: center; justify-content: center;
        font-size: .95rem;
        text-decoration: none;
        color: var(--tx2);
        transition: all .2s;
        position: relative;
        cursor: pointer;
    }
    .nav-link:hover { border-color: var(--border2); color: var(--tx); background: var(--card2); }

    #notif-badge {
        position: absolute; top: -4px; right: -4px;
        background: var(--rose);
        color: #fff;
        border-radius: 50%;
        width: 16px; height: 16px;
        font-size: .58rem;
        font-family: var(--font-en);
        font-weight: 900;
        display: none;
        align-items: center; justify-content: center;
        border: 2px solid var(--bg);
    }

    .nav-name {
        font-size: .8rem;
        color: var(--tx2);
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 8px;
        max-width: 120px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        transition: color .15s;
    }
    .nav-name:hover { color: var(--tx); }

    .btn-logout {
        background: none;
        border: 1px solid var(--border);
        color: var(--tx3);
        width: 36px; height: 36px;
        border-radius: 10px;
        font-size: .85rem;
        cursor: pointer;
        transition: all .2s;
        display: flex; align-items: center; justify-content: center;
    }
    .btn-logout:hover { border-color: var(--rose); color: var(--rose); }

    /* ══ LAYOUT ══════════════════════════════════════ */
    .container {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 16px;
    }

    /* ══ CARD ═════════════════════════════════════════ */
    .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--r2);
        padding: 20px;
        margin-bottom: 14px;
        position: relative;
        overflow: hidden;
    }
    .card::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(99,102,241,0.03) 0%, transparent 60%);
        pointer-events: none;
    }
    .card-title {
        font-size: .72rem;
        font-weight: 700;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 14px;
    }

    /* ══ BUTTONS ══════════════════════════════════════ */
    .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        padding: 10px 22px;
        border-radius: var(--r);
        font-family: var(--font-ar);
        font-size: .9rem;
        font-weight: 700;
        cursor: pointer;
        border: none;
        text-decoration: none;
        transition: all .18s cubic-bezier(0.4,0,0.2,1);
        -webkit-tap-highlight-color: transparent;
        position: relative;
        overflow: hidden;
        white-space: nowrap;
        letter-spacing: .2px;
    }
    .btn::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(rgba(255,255,255,.07), transparent);
        pointer-events: none;
    }
    .btn:active { transform: scale(.96); }
    .btn:disabled { opacity: .35; cursor: not-allowed; transform: none !important; }

    .btn-primary {
        background: linear-gradient(135deg, var(--p), var(--p3));
        color: #fff;
        box-shadow: 0 4px 14px rgba(99,102,241,.35), inset 0 1px 0 rgba(255,255,255,.1);
    }
    .btn-primary:hover { box-shadow: 0 6px 20px rgba(99,102,241,.5); transform: translateY(-1px); }

    .btn-gold {
        background: linear-gradient(135deg, var(--gold), #d97706);
        color: #fff;
        box-shadow: 0 4px 14px rgba(245,158,11,.3);
    }
    .btn-gold:hover { box-shadow: 0 6px 20px rgba(245,158,11,.45); transform: translateY(-1px); }

    .btn-teal {
        background: linear-gradient(135deg, var(--teal), #0d9488);
        color: #fff;
        box-shadow: 0 4px 14px rgba(20,184,166,.3);
    }
    .btn-teal:hover { box-shadow: 0 6px 20px rgba(20,184,166,.45); transform: translateY(-1px); }

    .btn-danger {
        background: linear-gradient(135deg, var(--rose), #be123c);
        color: #fff;
        box-shadow: 0 4px 14px rgba(244,63,94,.3);
    }
    .btn-danger:hover { box-shadow: 0 6px 20px rgba(244,63,94,.45); transform: translateY(-1px); }

    .btn-ghost {
        background: var(--card2);
        color: var(--tx2);
        border: 1px solid var(--border);
    }
    .btn-ghost:hover { border-color: var(--border2); color: var(--tx); background: var(--card); }

    .btn-sm { padding: 6px 14px; font-size: .8rem; border-radius: 8px; }
    .btn-xs { padding: 4px 10px; font-size: .75rem; border-radius: 7px; }

    /* ══ INPUT ════════════════════════════════════════ */
    .input {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r);
        padding: 11px 14px;
        color: var(--tx);
        font-family: var(--font-ar);
        font-size: .95rem;
        outline: none;
        transition: border-color .15s, box-shadow .15s;
        line-height: 1;
    }
    .input:focus {
        border-color: var(--p);
        box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }
    .input::placeholder { color: var(--tx3); }

    /* ══ ALERTS ═══════════════════════════════════════ */
    .alert {
        padding: 10px 14px;
        border-radius: var(--r);
        font-size: .86rem;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .alert-error   { background:rgba(244,63,94,.08);   color:#fda4af; border:1px solid rgba(244,63,94,.2);  }
    .alert-info    { background:rgba(99,102,241,.08);   color:#a5b4fc; border:1px solid rgba(99,102,241,.2); }
    .alert-success { background:rgba(16,185,129,.08);  color:#6ee7b7; border:1px solid rgba(16,185,129,.2); }
    .alert-warn    { background:rgba(245,158,11,.08);   color:#fcd34d; border:1px solid rgba(245,158,11,.2); }
    .hidden { display: none !important; }

    /* ══ MODAL ════════════════════════════════════════ */
    .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,.75);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        display: flex; align-items: center; justify-content: center;
        z-index: 500; padding: 16px;
        animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .modal {
        background: var(--card);
        border: 1px solid var(--border2);
        border-radius: var(--r3);
        padding: 28px;
        width: 100%; max-width: 420px;
        max-height: 92vh; overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0,0,0,.6), var(--glow-p);
        animation: slideUp .25s cubic-bezier(0.175,0.885,0.32,1.275);
        position: relative;
    }
    @keyframes slideUp { from{transform:translateY(20px) scale(.97);opacity:0} to{transform:translateY(0) scale(1);opacity:1} }

    .modal h2 {
        font-size: 1.1rem;
        font-weight: 800;
        margin-bottom: 20px;
        display: flex; align-items: center; gap: 8px;
    }

    .mf-group { margin-bottom: 14px; }
    .mf-group label {
        display: block;
        font-size: .75rem;
        font-weight: 700;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 6px;
    }

    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 14px;
        font-family: var(--font-ar);
        font-size: .82rem;
        font-weight: 700;
        cursor: pointer;
        color: var(--tx2);
        transition: all .15s;
    }
    .chip-btn:hover { border-color: var(--border2); color: var(--tx); }
    .chip-btn.active {
        background: linear-gradient(135deg, var(--p), var(--p3));
        border-color: var(--p);
        color: #fff;
        box-shadow: 0 2px 10px rgba(99,102,241,.4);
    }

    /* ══ TOAST ════════════════════════════════════════ */
    .toast-wrap {
        position: fixed; bottom: 28px; left: 50%;
        transform: translateX(-50%);
        z-index: 9999; pointer-events: none;
        display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .toast {
        background: var(--card2);
        border: 1px solid var(--border2);
        border-radius: var(--r);
        padding: 11px 22px;
        font-size: .88rem;
        color: var(--tx);
        box-shadow: 0 8px 24px rgba(0,0,0,.4), var(--glow-p);
        animation: toastIn .3s cubic-bezier(0.175,0.885,0.32,1.275);
        white-space: nowrap;
    }
    @keyframes toastIn {
        from { opacity:0; transform:translateY(12px) scale(.9); }
        to   { opacity:1; transform:translateY(0)    scale(1);  }
    }

    /* ══ UTILITY ══════════════════════════════════════ */
    .sec-label {
        font-size: .7rem;
        font-weight: 700;
        color: var(--tx3);
        text-transform: uppercase;
        letter-spacing: 1.5px;
        margin-bottom: 10px;
    }

    .rank-pill {
        display: inline-flex; align-items: center; gap: 5px;
        border-radius: 20px; padding: 3px 11px;
        font-size: .75rem; font-weight: 700;
        border: 1px solid; margin-top: 4px;
    }

    .xp-bar-wrap { background: var(--surface); border-radius: 4px; height: 4px; overflow: hidden; }
    .xp-bar-fill { height: 100%; background: linear-gradient(90deg, var(--p), var(--v)); border-radius: 4px; transition: width .8s; }

    /* ══ PWA BANNER ═══════════════════════════════════ */
    #pwa-banner {
        position: fixed; bottom:0; left:0; right:0;
        background: rgba(7,7,15,.92);
        border-top: 1px solid var(--border2);
        backdrop-filter: blur(20px);
        padding: 12px 18px;
        display: flex; align-items: center; gap: 12px;
        z-index: 9000;
        box-shadow: 0 -4px 20px rgba(0,0,0,.4);
    }
    #pwa-banner img { width:38px;height:38px;border-radius:10px;flex-shrink:0; }
    #pwa-banner .pt { flex:1; }
    #pwa-banner .pt b { display:block;font-size:.88rem; }
    #pwa-banner .pt s { font-size:.74rem;color:var(--tx3);font-style:normal; }
    #pwa-install-btn {
        background: linear-gradient(135deg, var(--p), var(--p3));
        color:#fff; border:none; border-radius:9px;
        padding:8px 16px; font-family:var(--font-ar);
        font-size:.82rem; font-weight:700; cursor:pointer;
        white-space:nowrap;
        box-shadow: 0 3px 12px rgba(99,102,241,.4);
    }
    #pwa-dismiss-btn { background:none;border:none;color:var(--tx3);font-size:1.1rem;cursor:pointer;padding:4px 8px; }
    #ios-banner {
        position:fixed;bottom:0;left:0;right:0;
        background:rgba(7,7,15,.92);border-top:1px solid var(--border2);
        backdrop-filter:blur(20px);padding:14px 18px;z-index:9000;text-align:center;
    }
    #ios-banner span { color:var(--gold2);font-weight:700; }
    #ios-close { position:absolute;top:10px;left:12px;background:none;border:none;color:var(--tx3);font-size:1.1rem;cursor:pointer; }

    /* ══ SHIMMER LOADING ══════════════════════════════ */
    .shimmer {
        background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: var(--r);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

{% if session.player_id %}
<nav>
    <a href="/lobby" class="nav-logo">
        <span class="logo-icon">🎯</span>
        Guess<span class="logo-text">Up</span>
    </a>
    <div class="nav-right">
        {% set me = get_player() %}
        {% if me %}
        <span class="nav-pts">{{ me.points }} <span style="color:var(--tx3);font-weight:400">pts</span></span>
        <a href="/friends" class="nav-link" title="الأصدقاء">👥</a>
        <a href="/notifications" id="nav-bell" class="nav-link" title="الإشعارات">
            🔔
            <span id="notif-badge"></span>
        </a>
        <a href="/player/{{ session.player_id }}" class="nav-name">{{ session.player_name }}</a>
        {% endif %}
        <form action="/logout" method="get" style="display:inline">
            <button class="btn-logout" title="خروج">⏻</button>
        </form>
    </div>
</nav>
{% endif %}

<div class="toast-wrap" id="toastWrap"></div>

{% block content %}{% endblock %}

<!-- PWA -->
<div id="pwa-banner" style="display:none">
    <img src="/static/icons/icon-96x96.png" alt="">
    <div class="pt"><b>📲 ثبّت Guess Up</b><s>العب بدون متصفح</s></div>
    <button id="pwa-install-btn">تثبيت ⚡</button>
    <button id="pwa-dismiss-btn">✕</button>
</div>
<div id="ios-banner" style="display:none">
    <button id="ios-close" onclick="closePwa()">✕</button>
    <p style="font-size:.88rem;margin-bottom:4px">اضغط <span>⬆️ Share</span> ثم <span>Add to Home Screen</span></p>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script>
// Toast
function showToast(msg, dur) {
    dur = dur || 2800;
    var w = document.getElementById('toastWrap');
    var t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    w.appendChild(t);
    setTimeout(function(){
        t.style.opacity='0'; t.style.transform='translateY(8px)';
        t.style.transition='all .25s';
        setTimeout(function(){t.remove();}, 250);
    }, dur);
}
// Notifications badge
function updateNotifBadge(){
    fetch('/api/notifications/count').then(function(r){return r.json();}).then(function(d){
        var b=document.getElementById('notif-badge');
        if(!b) return;
        if(d.count>0){b.textContent=d.count>9?'9+':d.count;b.style.display='inline-flex';}
        else{b.style.display='none';}
    }).catch(function(){});
}
updateNotifBadge();
setInterval(updateNotifBadge,30000);
// SW
if('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js').catch(function(){});
// PWA
var _p=null;
function _wd(){try{var d=localStorage.getItem('pwa_d');return d&&(Date.now()-d)<604800000;}catch(e){return false;}}
function closePwa(){
    document.getElementById('pwa-banner').style.display='none';
    document.getElementById('ios-banner').style.display='none';
    try{localStorage.setItem('pwa_d',Date.now());}catch(e){}
}
window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();_p=e;
    if(!_wd()) setTimeout(function(){document.getElementById('pwa-banner').style.display='flex';},3000);
});
var _ib=document.getElementById('pwa-install-btn');
if(_ib)_ib.onclick=function(){if(!_p)return;_p.prompt();_p.userChoice.then(function(){document.getElementById('pwa-banner').style.display='none';_p=null;});};
document.getElementById('pwa-dismiss-btn').onclick=closePwa;
if(/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.navigator.standalone&&!_wd())
    setTimeout(function(){document.getElementById('ios-banner').style.display='block';},3000);
window.addEventListener('appinstalled',function(){document.getElementById('pwa-banner').style.display='none';});
// Real-time notifications
document.addEventListener('DOMContentLoaded',function(){
    if(typeof io==='undefined') return;
    function listenNotifs(){
        if(typeof socket==='undefined'){setTimeout(listenNotifs,500);return;}
        socket.emit('join_personal_room',{});
        socket.on('new_notification',function(data){
            var b=document.getElementById('notif-badge');
            if(b){var c=parseInt(b.textContent)||0;b.textContent=c+1;b.style.display='inline-flex';}
            showNotifToast(data.title,data.body,data.link);
            if(Notification.permission==='granted'){
                var n=new Notification(data.title,{body:data.body,icon:'/static/icons/icon-96x96.png'});
                n.onclick=function(){if(data.link)window.location.href=data.link;};
            }
        });
        socket.on('new_chat_msg',function(data){
            if(window.location.pathname!=='/chat/'+data.from_id){
                showNotifToast('💬 '+data.from_name,data.text,'/chat/'+data.from_id);
            }
        });
    }
    listenNotifs();
});
function showNotifToast(title,body,link){
    var t=document.createElement('div');
    t.style.cssText='position:fixed;top:68px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);border-radius:var(--r2);padding:12px 18px;z-index:8999;cursor:pointer;max-width:320px;width:90%;box-shadow:0 8px 24px rgba(0,0,0,.5);animation:slideUp .3s ease;backdrop-filter:blur(10px)';
    t.innerHTML='<div style="font-weight:700;font-size:.86rem;margin-bottom:2px">'+title+'</div><div style="font-size:.78rem;color:var(--tx2)">'+body+'</div>';
    if(link)t.onclick=function(){window.location.href=link;};
    document.body.appendChild(t);
    setTimeout(function(){t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(function(){t.remove();},300);},4500);
}
if('Notification' in window&&Notification.permission==='default'){
    setTimeout(function(){Notification.requestPermission();},4000);
}
</script>
